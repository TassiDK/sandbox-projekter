<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hype-Træet 🌳</title>
  <meta name="description" content="En interaktiv karriere tracker – dine kompetencer og bedrifter som et voksende træ." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-mode">

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🌳</span>
        <span class="logo-text">Hype-Træet</span>
      </div>
      <nav class="header-actions">
        <button id="theme-toggle" class="btn-icon" title="Skift tema" aria-label="Skift tema">
          <span class="theme-icon">☀️</span>
        </button>
        <button id="share-btn" class="btn-icon" title="Del" aria-label="Del side">
          <span>↗</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main-layout">

    <!-- Profile card -->
    <aside class="profile-panel" id="profile-panel">
      <div class="profile-avatar" id="profile-avatar">🧑‍💻</div>
      <h1 class="profile-name" id="profile-name">…</h1>
      <p class="profile-title" id="profile-title">…</p>
      <p class="profile-tagline" id="profile-tagline">…</p>
      <div class="profile-stats" id="profile-stats"></div>
      <div class="legend" id="legend"></div>
    </aside>

    <!-- Tree canvas -->
    <section class="tree-section" aria-label="Karriere-træ">
      <div class="tree-container" id="tree-container">
        <svg id="tree-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
        <div id="particle-layer" aria-hidden="true"></div>
      </div>
      <p class="tree-hint">Hover over bladene · Klik på grene for at folde ud</p>
    </section>

  </main>

  <!-- ===== TOOLTIP ===== -->
  <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true">
    <div class="tooltip-header">
      <span class="tooltip-icon" id="tt-icon"></span>
      <span class="tooltip-title" id="tt-title"></span>
    </div>
    <p class="tooltip-desc" id="tt-desc"></p>
    <div class="tooltip-meta" id="tt-meta"></div>
    <a class="tooltip-link" id="tt-link" href="#" target="_blank" rel="noopener">Åbn link →</a>
  </div>

  <!-- ===== SHARE MODAL ===== -->
  <div class="modal-overlay" id="share-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Del Hype-Træet">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Luk">✕</button>
      <h2>Del dit Hype-Træ 🌳</h2>
      <p>Vis verden hvad du er lavet af!</p>
      <div class="share-buttons">
        <a class="share-btn linkedin" id="share-linkedin" href="#" target="_blank" rel="noopener">
          <span>in</span> LinkedIn
        </a>
        <a class="share-btn twitter" id="share-twitter" href="#" target="_blank" rel="noopener">
          <span>𝕏</span> Twitter / X
        </a>
        <button class="share-btn copy" id="share-copy">
          <span>🔗</span> Kopier link
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
